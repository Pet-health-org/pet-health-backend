name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: pethealth_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      NODE_ENV: test
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: root
      DB_NAME: pethealth_ci
      DB_SYNCHRONIZE: true
      DB_LOGGING: false
      DB_SSL: false
      JWT_SECRET: ci_test_secret
      JWT_EXPIRES_IN: 24h
      HORARIO_DURACION_MINUTOS: 30
      HORARIO_HORA_INICIO: 7
      HORARIO_HORA_FIN: 19
      HASH_SALT_ROUNDS: 12
      PAGINATION_DEFAULT_LIMIT: 20
      PAGINATION_MAX_LIMIT: 20
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_FROM: noreply@pethealth.com
      SMTP_SECURE: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Unit tests
        run: pnpm run test

      - name: Unit tests coverage
        run: pnpm run test:cov

      - name: E2E tests
        run: pnpm run test:e2e

  cd-deploy:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: [backend-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deploy
        run: |
          if [ -n "${{ secrets.BUILD_HOOK }}" ]; then
            curl -X POST "${{ secrets.BUILD_HOOK }}"
          else
            echo "No BUILD_HOOK secret defined, skipping deploy trigger"
          fi
