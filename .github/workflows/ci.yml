name: CI

on:
  push:
    branches:
      - main
      - produccion
  pull_request:
    branches:
      - main
      - produccion
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: pethealth_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: root
      DB_NAME: pethealth_ci
      DB_SYNCHRONIZE: true
      DB_LOGGING: false
      DB_SSL: false
      JWT_SECRET: ci_secret
      JWT_EXPIRES_IN: 1800
      NODE_ENV: test
      HORARIO_DURACION_MINUTOS: 30
      HORARIO_HORA_INICIO: 7
      HORARIO_HORA_FIN: 19
      HASH_SALT_ROUNDS: 12
      PAGINATION_DEFAULT_LIMIT: 20
      PAGINATION_MAX_LIMIT: 20
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_FROM: noreply@pethealth.com
      SMTP_SECURE: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if (echo > /dev/tcp/127.0.0.1/3306) >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test -- --runInBand

      - name: E2E tests
        run: npm run test:e2e -- --runInBand
